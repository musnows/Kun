name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            kun/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Kun runtime dependencies
        run: npm --prefix kun ci

      - name: Typecheck root app
        run: npm run typecheck

      - name: Typecheck Kun runtime
        run: npm --prefix kun run typecheck

      - name: Test root app
        run: npm run test

      - name: Test Kun runtime
        run: npm --prefix kun run test

  package:
    name: Build Linux package
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            kun/package-lock.json

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm build-essential python3

      - name: Install root dependencies
        run: npm ci

      - name: Install Kun runtime dependencies
        run: npm --prefix kun ci

      - name: Build Linux AppImage
        run: npm run dist:linux

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: pr-linux-package
          if-no-files-found: error
          retention-days: 3
          path: |
            dist/Kun-*-linux-*.AppImage
            dist/Kun-*-linux-*.AppImage.blockmap
